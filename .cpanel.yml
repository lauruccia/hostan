---
deployment:
  tasks:
    # $HOME è la home dell'account cPanel che esegue il deploy:
    # funziona sia su /home/hostand sia su /home/minialberghi senza modifiche.
    # 1) Codice applicativo, FUORI dalla web root. Preserva .env e storage del server.
    - /usr/bin/rsync -a --exclude='.git' --exclude='.env' --exclude='.env.*' --exclude='storage/' ./app_hostand/ $HOME/app_hostand/
    # 2) Web root (= contenuto di public/). Preserva uploads e il symlink storage esistenti.
    - /usr/bin/rsync -a --exclude='uploads' --exclude='upload' --exclude='assets/images' --exclude='storage' ./public_html/ $HOME/public_html/
    # 3) Crea lo scheletro di storage se manca (necessario su account nuovo/vuoto).
    - /bin/mkdir -p $HOME/app_hostand/storage/framework/cache $HOME/app_hostand/storage/framework/sessions $HOME/app_hostand/storage/framework/views $HOME/app_hostand/storage/logs $HOME/app_hostand/storage/app/public
    # 4) Symlink di storage (disco 'public', servito da /storage/). Idempotente.
    - /bin/ln -sfn $HOME/app_hostand/storage/app/public $HOME/public_html/storage
    # 4) Svuota la cache di config (evita percorsi vecchi in cache)
    - /bin/rm -f $HOME/app_hostand/bootstrap/cache/config.php $HOME/app_hostand/bootstrap/cache/routes-v7.php
